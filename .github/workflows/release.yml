name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p stage
          cp target/release/dicegame stage/dice-wars
          cp README.md LICENSE assets/icon.png stage/
          tar -czf dice-wars-${{ github.ref_name }}-linux-x86_64.tar.gz -C stage dice-wars README.md LICENSE icon.png
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # drop any stray draft with our name, then create-or-reuse the release
          for id in $(gh api "repos/${{ github.repository }}/releases" --jq '.[] | select(.draft) | .id'); do
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id" || true
          done
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md || true
          gh release upload "${{ github.ref_name }}" "dice-wars-${{ github.ref_name }}-linux-x86_64.tar.gz" --clobber

  windows:
    needs: linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item target/release/dicegame.exe stage/DiceWars.exe
          Copy-Item README.md,LICENSE,assets/icon.ico stage/
          Compress-Archive -Path stage/* -DestinationPath "dice-wars-${{ github.ref_name }}-windows-x86_64.zip"
      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "dice-wars-${{ github.ref_name }}-windows-x86_64.zip" --clobber
