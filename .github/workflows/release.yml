name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p stage
          cp target/release/dicegame stage/dice-wars
          cp README.md LICENSE assets/icon.png stage/
          tar -czf dice-wars-${{ github.ref_name }}-linux-x86_64.tar.gz -C stage dice-wars README.md LICENSE icon.png
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dice-wars-${{ github.ref_name }}-linux-x86_64.tar.gz

  windows:
    needs: linux # serialize: both jobs upload to the same release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item target/release/dicegame.exe stage/DiceWars.exe
          Copy-Item README.md,LICENSE,assets/icon.ico stage/
          Compress-Archive -Path stage/* -DestinationPath "dice-wars-${{ github.ref_name }}-windows-x86_64.zip"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dice-wars-${{ github.ref_name }}-windows-x86_64.zip
